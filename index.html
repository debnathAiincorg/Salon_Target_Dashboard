<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Dashboard</title>

    <!-- Chart.js library -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <!-- Chart.js Data Labels Plugin -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            background-color: #fff;
            padding: 24px;
            font-size: 16px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* KPI Cards Row */
        .kpi-cards {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .kpi-card {
            flex: 1;
            min-width: 200px;
            background-color: #f7f7f7;
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 210px;
        }

        .kpi-value {
            font-size: 32px;
            font-weight: 700;
            color: #000;
            line-height: 1.2;
            margin-bottom: 16px;
        }

        .kpi-label {
            font-size: 13px;
            color: #666;
            font-weight: 400;
            line-height: 1.4;
        }

        /* Chart Card */
        .chart-card {
            background-color: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 24px;
            min-height: 400px;
        }

        .chart-title {
            font-size: 14px;
            color: #333;
            margin-bottom: 16px;
            font-weight: 500;
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 350px;
        }

        canvas {
            max-width: 100%;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .kpi-cards {
                gap: 12px;
            }

            .kpi-card {
                min-width: 150px;
                padding: 16px;
                min-height: 180px;
            }

            .kpi-value {
                font-size: 24px;
            }

            .kpi-label {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- KPI Cards Section -->
        <div class="kpi-cards">
            <div class="kpi-card">
                <div class="kpi-value" id="current-date-label">-</div>
                <div class="kpi-label">Current Date Label</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-value" id="current-week-sales">-</div>
                <div class="kpi-label">Current Week Sales</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-value" id="current-week-balance">-</div>
                <div class="kpi-label">Current Week Balance</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-value" id="remaining-days">-</div>
                <div class="kpi-label">Remaining Days</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-value" id="previous-week-sales">-</div>
                <div class="kpi-label">Previous Week Sales</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-value" id="monthly-sales">-</div>
                <div class="kpi-label">Monthly Sales</div>
            </div>
        </div>

        <!-- Chart Section -->
        <div class="chart-card">
            <div class="chart-title">Sum of daily_sales by date</div>
            <div class="chart-container">
                <canvas id="daily-sales-chart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // JavaScript will be added in Tasks 9-10
        console.log("Dashboard loading...");
    </script>
</body>
</html>
