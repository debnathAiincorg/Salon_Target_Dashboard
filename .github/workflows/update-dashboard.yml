name: Update Dashboard Data

on:
  workflow_dispatch:
  repository_dispatch:
    types: [update-dashboard]

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl requests

      - name: Fetch and compute dashboard data
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          SHAREPOINT_SHARE_LINK: ${{ secrets.SHAREPOINT_SHARE_LINK }}
        run: python fetch_and_compute.py

      - name: Commit and push if dashboard-data.json changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard-data.json
          if git diff --cached --quiet; then
            echo "No changes to dashboard-data.json, skipping commit"
          else
            git commit -m "chore: update dashboard-data.json via GitHub Actions"
            git push origin main
          fi
